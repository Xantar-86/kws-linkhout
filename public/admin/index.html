<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>KWS Linkhout - CMS</title>
  </head>
  <body>
    <script>
      // Fix 1: omhul window.open zodat Decap's authWindow.close() nooit een SecurityError
      // gooit. GitHub gebruikt COOP: same-origin-allow-popups, waardoor de
      // opener→popup referentie verbroken wordt na GitHub-navigatie. Decap's
      // authorizeCallback roept dan authWindow.close() aan in een komma-expressie:
      //   removeEventListener(...), authWindow.close(), e(null,o)
      // Als close() gooit, draait e(null,o) nooit → login mislukt stilletjes.
      (function () {
        var _open = window.open;
        window.open = function (url, name, features) {
          var popup = _open.call(window, url, name, features);
          if (!popup) return popup;
          return {
            get closed() { try { return popup.closed; } catch (e) { return true; } },
            close:       function () { try { popup.close(); } catch (e) { console.log('[admin] authWindow.close() onderdrukt (COOP)'); } },
            postMessage: function (msg, org) { try { popup.postMessage(msg, org); } catch (e) { console.error('[admin] postMessage fout:', e); } },
            focus:       function () { try { popup.focus(); } catch (e) {} }
          };
        };
      })();

      // Debug: log ALLE message events (vóór Decap)
      window.addEventListener('message', function (e) {
        if (typeof e.data === 'string' && e.data.length > 0) {
          console.log('[admin] MESSAGE EVENT:', e.origin, '|', e.data.substring(0, 120), '| trusted:', e.isTrusted);
        }
      }, true);

      // Debug: onderschep fetch zodat we GitHub API calls zien
      (function () {
        var _fetch = window.fetch;
        window.fetch = function (url, opts) {
          var urlStr = (typeof url === 'string' ? url : url.url || String(url)).substring(0, 100);
          console.log('[admin] fetch →', urlStr);
          return _fetch.apply(this, arguments).then(function (res) {
            console.log('[admin] fetch ←', urlStr, res.status, res.ok ? 'OK' : 'FOUT');
            return res;
          }).catch(function (err) {
            console.error('[admin] fetch FOUT:', urlStr, err.message);
            throw err;
          });
        };
      })();

      // Fix 2a: BroadcastChannel (betrouwbaarder dan StorageEvent voor cross-window same-origin)
      try {
        var _bc = new BroadcastChannel('kws-decap-auth');
        _bc.onmessage = function (e) {
          console.log('[admin] BroadcastChannel ontvangen, doorsturen via postMessage');
          window.postMessage(e.data, window.location.origin);
        };
      } catch (e) { console.log('[admin] BroadcastChannel niet beschikbaar'); }

      // Fix 2b: localStorage-fallback als opener toch null is.
      window.addEventListener('storage', function (e) {
        if (e.key !== 'kws-auth-token' || !e.newValue) return;
        console.log('[admin] storage event: kws-auth-token ontvangen');
        try {
          var stored = JSON.parse(e.newValue);
          if (Date.now() - stored.ts > 30000) return;
          localStorage.removeItem('kws-auth-token');
          console.log('[admin] localStorage-fallback: token → window.postMessage');
          window.postMessage(stored.message, window.location.origin);
        } catch (err) {
          console.error('[admin] fallback fout:', err);
        }
      });
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
