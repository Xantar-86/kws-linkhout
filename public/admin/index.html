<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>KWS Linkhout - CMS</title>
  </head>
  <body>
    <script>
      // Fallback voor wanneer window.opener null is na GitHub redirect.
      // Decap's authorizeCallback checkt e.origin === base_url.
      // window.location.origin === base_url (beide https://www.kwslinkhout.be),
      // dus een synthetisch MessageEvent met window.location.origin als origin werkt.
      window.addEventListener('storage', function(e) {
        if (e.key !== 'kws-auth-token') return;
        if (!e.newValue) return;
        try {
          var stored = JSON.parse(e.newValue);
          if (Date.now() - stored.ts > 30000) return;
          localStorage.removeItem('kws-auth-token');
          console.log('[admin] auth ontvangen via localStorage fallback, doorsturen naar Decap');
          window.dispatchEvent(new MessageEvent('message', {
            data: stored.message,
            origin: window.location.origin
          }));
        } catch (err) {
          console.error('[admin] fallback fout:', err);
        }
      });
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
