<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>KWS Linkhout - CMS</title>
  </head>
  <body>
    <script>
      // Fallback: ontvang auth-token via localStorage wanneer window.opener
      // null is na cross-origin navigatie (GitHub COOP security headers).
      // Decap accepteert berichten van window.location.origin, dus een
      // synthetisch MessageEvent met die origin werkt altijd.
      window.addEventListener('storage', function(e) {
        if (e.key !== 'kws-auth-token') return;
        if (!e.newValue) return;
        try {
          var authData = JSON.parse(e.newValue);
          if (Date.now() - authData.ts > 30000) return; // Max 30 seconden oud
          localStorage.removeItem('kws-auth-token');
          console.log('[admin] auth token ontvangen via localStorage, doorsturen naar Decap');
          // Synthetisch bericht met origin = window.location.origin
          // Decap accepteert: origin === base_url OR origin === window.location.origin
          window.dispatchEvent(new MessageEvent('message', {
            data: 'authorization:github:success:' + authData.token,
            origin: window.location.origin
          }));
        } catch (err) {
          console.error('[admin] auth relay fout:', err);
        }
      });
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
