<!doctype html>
<html><head><meta charset="utf-8"></head>
<body>
<script>
  var _pat = null;
  window.addEventListener('message', function(e) {
    if (!e.data) return;
    // Stap 1: ontvang PAT van parent
    if (e.data.type === 'kws-init') {
      _pat = e.data.pat;
      return;
    }
    // Stap 2: start handshake (op verzoek van parent)
    if (e.data.type === 'kws-start') {
      window.parent.postMessage('authorizing:github', e.origin);
      return;
    }
    // Stap 3: Decap echoot 'authorizing:github' terug naar ons (de popup)
    if (typeof e.data === 'string' && e.data.indexOf('authorizing:') === 0 && _pat) {
      setTimeout(function() {
        window.parent.postMessage(
          'authorization:github:success:' + JSON.stringify({ token: _pat, provider: 'github' }),
          e.origin
        );
      }, 50);
    }
  });
</script>
</body></html>
