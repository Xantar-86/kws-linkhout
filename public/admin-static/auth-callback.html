<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Authenticating...</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
    .box { background: white; padding: 40px; border-radius: 8px; text-align: center; max-width: 400px; }
    #status { color: #555; margin-top: 10px; }
    #debug { color: #999; font-size: 11px; margin-top: 20px; text-align: left; word-break: break-all; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="box">
    <h2>KWS Linkhout CMS</h2>
    <p id="status">Bezig met inloggen...</p>
    <pre id="debug"></pre>
  </div>
  <script>
    function log(msg) {
      document.getElementById('debug').textContent += msg + '\n';
      console.log('[auth-callback]', msg);
    }

    (function() {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var error = params.get('error');

      log('origin: ' + window.location.origin);
      log('opener: ' + (window.opener ? 'aanwezig' : 'NULL'));

      if (error) {
        document.getElementById('status').textContent = 'Fout: ' + error;
        log('ERROR: ' + error);
        return;
      }

      if (code) {
        // ── Stap 2: code ontvangen van GitHub → token ophalen ──
        document.getElementById('status').textContent = 'Login afronden...';
        log('code ontvangen, token ophalen...');

        fetch('/api/auth?code=' + encodeURIComponent(code))
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (!data.token) {
              log('FOUT: geen token - ' + JSON.stringify(data));
              document.getElementById('status').textContent = 'Fout: ' + (data.error || 'geen token');
              return;
            }

            log('token ontvangen');

            // Decap verwacht JSON na 'success:' — NIET de raw token string
            // Zie decap-cms-lib-auth: JSON.parse(e.data.match(...)[1])
            var tokenJson = JSON.stringify({ token: data.token, provider: 'github' });
            var message = 'authorization:github:success:' + tokenJson;

            // Primaire methode: postMessage naar opener
            if (window.opener && !window.opener.closed) {
              window.opener.postMessage(message, '*');
              log('postMessage verstuurd naar opener');
            } else {
              log('opener niet beschikbaar');
            }

            // Fallback 1: BroadcastChannel (betrouwbaarder dan StorageEvent)
            try {
              var bc = new BroadcastChannel('kws-decap-auth');
              bc.postMessage(message);
              bc.close();
              log('BroadcastChannel verstuurd');
            } catch (bcErr) { log('BroadcastChannel n.v.t.'); }

            // Fallback 2: localStorage StorageEvent
            localStorage.setItem('kws-auth-token', JSON.stringify({
              message: message,
              ts: Date.now()
            }));
            log('opgeslagen in localStorage als fallback');

            document.getElementById('status').textContent = 'Ingelogd! Venster sluit...';
            setTimeout(function() { window.close(); }, 800);
          })
          .catch(function(err) {
            log('fetch fout: ' + err.message);
            document.getElementById('status').textContent = 'Netwerkfout: ' + err.message;
          });

      } else {
        // ── Stap 1: geen code → handshake met Decap, dan naar GitHub ──
        // Decap-flow (netlify-auth.ts):
        //   1. popup stuurt 'authorizing:github' naar parent
        //   2. parent (Decap) ontvangt dit, stuurt 'authorizing:github' TERUG naar popup
        //   3. popup ontvangt de echo en redirect naar GitHub

        document.getElementById('status').textContent = 'Verbinden met GitHub...';

        // Luister op de echo van Decap
        window.addEventListener('message', function(e) {
          if (e.data === 'authorizing:github') {
            log('echo ontvangen van Decap, redirect naar GitHub');
            window.location.replace(
              'https://github.com/login/oauth/authorize'
              + '?client_id=Ov23liafFGErfmejn48L'
              + '&redirect_uri=' + encodeURIComponent('https://kwslinkhout.be/admin-static/auth-callback.html')
              + '&scope=repo'
            );
          }
        });

        // Stuur handshake naar parent
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage('authorizing:github', '*');
          log('handshake verstuurd naar Decap, wachten op echo...');
        } else {
          log('FOUT: geen opener venster');
          document.getElementById('status').textContent = 'Fout: pagina opnieuw laden en opnieuw proberen.';
        }
      }
    })();
  </script>
</body>
</html>
