<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Authenticating...</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
    .box { background: white; padding: 40px; border-radius: 8px; text-align: center; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Authenticating...</h1>
    <p id="status">Please wait...</p>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var error = params.get('error');

      if (error) {
        document.getElementById('status').textContent = 'Error: ' + error;
        return;
      }

      if (!code) {
        // Stap 1: nog geen code - wacht op Decap, redirect dan naar GitHub
        document.getElementById('status').textContent = 'Connecting to GitHub...';

        window.addEventListener('message', function(e) {
          if (e.data === 'authorizing:github') {
            window.location.href = 'https://github.com/login/oauth/authorize'
              + '?client_id=Ov23liafFGErfmejn48L'
              + '&redirect_uri=' + encodeURIComponent('https://kwslinkhout.be/admin-static/auth-callback.html')
              + '&scope=repo';
          }
        });

        if (window.opener) {
          window.opener.postMessage('authorizing:github', '*');
        } else {
          document.getElementById('status').textContent = 'Error: geen opener venster.';
        }
        return;
      }

      // Stap 2: code ontvangen - inwisselen voor token
      document.getElementById('status').textContent = 'Completing login...';

      fetch('/api/auth?code=' + encodeURIComponent(code))
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.token) {
            if (window.opener) {
              window.opener.postMessage('authorization:github:success:' + data.token, '*');
            }
            document.getElementById('status').textContent = 'Success!';
            setTimeout(function() { window.close(); }, 500);
          } else {
            document.getElementById('status').textContent = 'Error: ' + (data.error || 'No token');
          }
        })
        .catch(function(err) {
          document.getElementById('status').textContent = 'Error: ' + err.message;
        });
    })();
  </script>
</body>
</html>
