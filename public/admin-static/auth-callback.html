<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><title>Authenticating...</title></head>
<body>
<p>Bezig met inloggen...</p>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');

  if (!code) {
    window.opener.postMessage('authorization:github:error:{"message":"Geen code ontvangen van GitHub"}', '*');
    return;
  }

  fetch('/api/auth?code=' + encodeURIComponent(code))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.token) {
        function receiveMessage(e) {
          window.opener.postMessage(
            'authorization:github:success:' + JSON.stringify({ token: data.token, provider: 'github' }),
            e.origin
          );
        }
        window.addEventListener('message', receiveMessage, false);
        window.opener.postMessage('authorizing:github', '*');
      } else {
        window.opener.postMessage(
          'authorization:github:error:' + JSON.stringify({ message: data.error || 'Inloggen mislukt' }),
          '*'
        );
      }
    })
    .catch(function() {
      window.opener.postMessage('authorization:github:error:{"message":"Verbindingsfout"}', '*');
    });
})();
</script>
</body>
</html>
