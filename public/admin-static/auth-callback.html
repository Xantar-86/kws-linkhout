<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><title>Authenticating...</title></head>
<body>
<p id="status">Bezig met inloggen...</p>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');

  if (!code) {
    document.getElementById('status').textContent = 'Fout: geen code ontvangen van GitHub.';
    return;
  }

  var token = null;
  var openerOrigin = null;

  // Stap 1: start token fetch en handshake tegelijk

  // Fetch token van onze API
  fetch('/api/auth?code=' + encodeURIComponent(code))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.token) {
        token = data.token;
        sendIfReady();
      } else {
        document.getElementById('status').textContent = 'Fout: ' + (data.error || 'Token ophalen mislukt');
      }
    })
    .catch(function(err) {
      document.getElementById('status').textContent = 'Verbindingsfout: ' + err.message;
    });

  // Luister op bericht van Decap opener (geeft ons de correcte origin)
  window.addEventListener('message', function(e) {
    openerOrigin = e.origin;
    sendIfReady();
  }, false);

  // Start handshake met opener
  if (window.opener) {
    window.opener.postMessage('authorizing:github', '*');
  } else {
    document.getElementById('status').textContent = 'Fout: geen opener venster gevonden.';
  }

  // Stuur token zodra we zowel de token als de origin hebben
  function sendIfReady() {
    if (token && openerOrigin) {
      document.getElementById('status').textContent = 'Ingelogd! Venster sluit...';
      window.opener.postMessage(
        'authorization:github:success:' + JSON.stringify({ token: token, provider: 'github' }),
        openerOrigin
      );
      setTimeout(function() { window.close(); }, 500);
    }
  }
})();
</script>
</body>
</html>
