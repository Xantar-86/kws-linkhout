<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><title>Authenticating...</title></head>
<body>
<p id="status">Bezig met inloggen...</p>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');

  if (!code) {
    document.getElementById('status').textContent = 'Fout: geen code ontvangen.';
    return;
  }

  fetch('/api/auth?code=' + encodeURIComponent(code))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.token) {
        window.opener.postMessage(
          'authorization:github:success:' + JSON.stringify({ token: data.token, provider: 'github' }),
          '*'
        );
        window.close();
      } else {
        document.getElementById('status').textContent = 'Fout: ' + (data.error || 'onbekend');
      }
    })
    .catch(function(err) {
      document.getElementById('status').textContent = 'Verbindingsfout: ' + err.message;
    });
})();
</script>
</body>
</html>
